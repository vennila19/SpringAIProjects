spring.application.name=ChatBotRAG

# Ollama
spring.datasource.url=jdbc:postgresql://localhost:5432/banking_chatbot
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver


# JPA Configuration

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Spring AI Ollama Configuration
spring.ai.ollama.base-url=http://localhost:11434

# Chat Model
spring.ai.ollama.chat.model=llama3

# Embedding Model
spring.ai.ollama.embedding.model=nomic-embed-text

#PGVector Vector Store

spring.ai.vectorstore.pgvector.initialize-schema=true

spring.ai.vectorstore.pgvector.index-type=hnsw
spring.ai.vectorstore.pgvector.distance-type=cosine_distance

spring.ai.vectorstore.pgvector.dimensions=768

spring.ai.vectorstore.pgvector.table-name=bank_documents

# Document Processing
app.rag.chunk-size=1000
app.rag.chunk-overlap=200
app.rag.top-k=5

# Logging
logging.level.org.springframework.ai=INFO
logging.level.org.springframework.jdbc=INFO