spring.application.name=ChatBotRAG

# Database / PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/banking_chatbot
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Spring AI Ollama Server Integration
spring.ai.ollama.base-url=http://localhost:11434
spring.ai.ollama.chat.options.model=llama3
spring.ai.ollama.embedding.options.model=nomic-embed-text

# PGVector Vector Store Configuration
spring.ai.vectorstore.pgvector.initialize-schema=true
spring.ai.vectorstore.pgvector.table-name=bank_documents
spring.ai.vectorstore.pgvector.dimensions=768
spring.ai.vectorstore.pgvector.index-type=hnsw
spring.ai.vectorstore.pgvector.distance-type=cosine_distance

# Custom Token Extraction and Tuning Rules
app.rag.chunk-size=1000
app.rag.chunk-overlap=200
app.rag.top-k=5

# Tracing & Diagnostics Log Controls
logging.level.org.springframework.ai=INFO
logging.level.org.springframework.jdbc=INFO